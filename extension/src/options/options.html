<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Client Tracking Plugin - Настройки</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="container">
      <h1>Настройки Client Tracking Plugin</h1>
      <p class="description">
        Укажите параметры подключения к Supabase и селекторы DOM целевого сайта.
      </p>

      <form id="settingsForm">
        <label class="field">
          <span>API URL</span>
          <input id="apiUrl" type="url" required placeholder="https://project-ref.supabase.co" />
        </label>

        <label class="field">
          <span>API Key (publishable/anon)</span>
          <div class="password-field">
            <input id="apiKey" type="password" required />
            <button
              id="toggleApiKeyVisibility"
              type="button"
              class="password-toggle"
              aria-label="Показать API Key"
              aria-pressed="false"
              title="Показать API Key"
            >
              <span class="eye-icon eye-open" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path
                    d="M2.2 12c1.8-3.7 5.4-6 9.8-6s8 2.3 9.8 6c-1.8 3.7-5.4 6-9.8 6s-8-2.3-9.8-6Z"
                  />
                  <circle cx="12" cy="12" r="3.1" />
                </svg>
              </span>
              <span class="eye-icon eye-closed" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M3 3l18 18" />
                  <path d="M2.2 12c1.8-3.7 5.4-6 9.8-6 1.7 0 3.3.3 4.7 1" />
                  <path d="M9.9 9.9a3.1 3.1 0 0 0 4.2 4.2" />
                  <path d="M17.5 14.5c-1.5 2.2-3.9 3.5-6.5 3.5-4.4 0-8-2.3-9.8-6 .9-1.8 2.1-3.2 3.6-4.2" />
                </svg>
              </span>
            </button>
          </div>
        </label>

        <label class="field">
          <span>Целевой домен</span>
          <input id="targetDomain" type="text" required placeholder="localhost" />
        </label>

        <label class="field">
          <span>Селектор модального окна</span>
          <input id="modalSelector" type="text" required placeholder=".sandbox-client-modal" />
        </label>

        <label class="field">
          <span>Селектор никнейма внутри модалки</span>
          <input id="nicknameSelector" type="text" required placeholder=".sandbox-nickname" />
        </label>

        <label class="checkbox">
          <input id="debug" type="checkbox" />
          <span>Включить debug-режим (минимальные логи без секретов)</span>
        </label>

        <div class="actions">
          <button type="submit">Сохранить</button>
          <button id="testConnection" type="button" class="secondary">Проверить подключение</button>
          <span id="status" class="status" aria-live="polite"></span>
        </div>
      </form>
    </main>

    <script src="../state/storage.js"></script>
    <script src="./options.js"></script>
  </body>
</html>
